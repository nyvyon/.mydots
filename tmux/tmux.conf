# --- list of plugins ---
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"

set -g @plugin "tmux-plugins/tmux-battery"

set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin 'tmux-plugins/tmux-continuum'


# --- general settings ---
set -g default-shell "/opt/homebrew/bin/fish"
set -g default-terminal "tmux-256color"
set -g mouse "on"
set -g base-index "1"
setw -g pane-base-index "1"
set -g renumber-windows "on"
set-option -g allow-rename "off"


# --- keybindings ---
# prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# configuration reload
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# new window
unbind c
bind-key c command-prompt -p "name:" "new-window -n '%%'"

# new session
unbind S
bind-key S command-prompt -p "name:" "new-session -s '%%'"


# --- resurrect settings ---
set -g @resurrect-capture-pane-contents "on"
set -g @resurrect-processes "btm"


# --- continuum settings ---
set -g @continuum-save-interval "5"
set -g @continuum-restore "on"


# --- battery settings ---
set -g @batt_icon_charge_tier8 "ůįĀĻ"
set -g @batt_icon_charge_tier7 "ůįāĀ"
set -g @batt_icon_charge_tier6 "ůįĀŅ"
set -g @batt_icon_charge_tier5 "ůįĀĺ"
set -g @batt_icon_charge_tier4 "ůįĀĹ"
set -g @batt_icon_charge_tier3 "ůįĀľ"
set -g @batt_icon_charge_tier2 "ůįĀĽ"
set -g @batt_icon_charge_tier1 "ůįĀļ"
set -g @batt_icon_status_charged "ůįö•"
set -g @batt_icon_status_charging "ůįāĄ"
set -g @batt_icon_status_discharging "ůįāÉ"
set -g @batt_icon_status_unknown "ůįāĎ"
set -g @batt_icon_status_attached "ůĪąĎ"


# --- styles ---
# colors
set -g @color_bg "#1a1b26"
set -g @color_fg "#c0caf5"
set -g @color_select "#283457"
set -g @color_green "#9ece6a"
set -g @color_yellow "#e0af68"
set -g @color_red "#f7768e"
set -g @color_current_window "#7aa2f7"

# window flag icons
set -g @icon_flag_last "ůįĖį"
set -g @icon_flag_current "ůįĖĮ"
set -g @icon_flag_zoom "ůįĀĆ"
set -g @icon_flag_mark "ůįÉÄ"
set -g @icon_flag_silent "ůįāõ"
set -g @icon_flag_activity "ůĪÖę"
set -g @icon_flag_bell "ůįāě"

# general style
set -g status-style  "bg=#{@color_bg},fg=#{@color_fg}"
set -g message-style "bg=#{@color_bg},fg=#{@color_fg}"
set -g mode-style    "bg=#{@color_select},fg=#{@color_fg}"
set -gF prompt-cursor-colour "#{@color_fg}"

# status left
set -g status-left-length 0
set -g status-left " #{?client_prefix,#[fg=#{@color_red}],#{?#{==:#{pane_mode},copy-mode},#[fg=#{@color_yellow}],#[fg=#{@color_green}]}}#S   "

# window status
set -g @flags_icon "#{?window_activity_flag,#{@icon_flag_activity},}#{?window_bell_flag,#{@icon_flag_bell},}#{?window_silence_flag,#{@icon_flag_silent},}#{?window_active,#{@icon_flag_current},}#{?window_last_flag,#{@icon_flag_last},}#{?window_marked_flag,#{@icon_flag_mark},}#{?window_zoomed_flag,#{@icon_flag_zoom},}"
set -g window-status-format "#I #{?#W,#W ,}#{E:@flags_icon}"
set -g window-status-current-format "#[fg=#{@color_current_window}]#I #{?#W,#W ,}#{E:@flags_icon}"
set -g window-status-separator "  ‚Ēā  "

# status right
set -g status-right-length 0
set -g status-right "#{?#{m/r:^([0-9]#{a:37}|10#{a:37})$,#{battery_percentage}},#[fg=#{@color_red}]#{battery_icon},#{battery_icon}}#{?#{==:#{battery_percentage},100#{a:37}},#{battery_percentage},#{?#{m/r:^[0-9][0-9]#{a:37}$,#{battery_percentage}}, #{battery_percentage},  #{battery_percentage}}} "


# --- initialize tpm ---
run "/opt/homebrew/opt/tpm/share/tpm/tpm"
